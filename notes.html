  <link href="https://fonts.googleapis.com/css2?family=Notable&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1614;
      --surface: #211d1a;
      --text: #f0e8d8;
      --text-muted: #9a8f82;
      --text-dim: #5a5148;
      --accent: #ffe066;
      --border: rgba(255, 255, 255, 0.05);
      --border-hover: rgba(255, 224, 102, 0.2);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow-x: hidden;
      color: var(--text);
    }

    #orb-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      max-width: 760px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 2rem;
      margin-bottom: 48px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      opacity: 0;
      transform: translateY(-12px);
      animation: fadeDown 1s ease forwards 0.3s;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header-title {
      font-family: 'Notable', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: #f5ecd7;
      letter-spacing: 0.08em;
      text-shadow: 0 0 40px rgba(255, 220, 100, 0.2);
    }

    .header-sub {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
      letter-spacing: 0.03em;
    }

    .back-btn {
      margin-top: 6px;
      flex-shrink: 0;
      font-family: 'Notable', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 9px 18px;
      transition: color 0.25s, border-color 0.25s, box-shadow 0.25s;
    }

    .back-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(255, 224, 102, 0.15);
    }

    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── POSTS ── */
    .posts {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.8s ease forwards;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .post-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 40px rgba(255, 224, 102, 0.06);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 32px;
      cursor: pointer;
      user-select: none;
      gap: 16px;
    }

    .post-title-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .post-title {
      font-family: 'Notable', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #f5ecd7;
      letter-spacing: 0.04em;
    }

    .post-preview {
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-toggle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-dim);
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .post-card.open .post-toggle {
      border-color: var(--accent);
      color: var(--accent);
      transform: rotate(45deg);
      box-shadow: 0 0 12px rgba(255, 224, 102, 0.2);
    }

    .post-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .post-card.open .post-body {
      max-height: 9999px;
    }

    .post-body-inner {
      padding: 0 32px 36px;
      border-top: 1px solid var(--border);
    }

    .post-body-inner p {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.9;
      color: var(--text);
      margin-top: 1.4rem;
    }

    .post-body-inner p:first-child {
      margin-top: 1.6rem;
    }

    .post-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 2px 0;
    }

    .empty {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      color: var(--text-dim);
      text-align: center;
      padding: 60px 0;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {

      .post-header { padding: 22px 20px; }
      .post-body-inner { padding: 0 20px 28px; }
      .back-btn { font-size: 0.62rem; padding: 7px 13px; }
    }

<body>

<canvas id="orb-canvas"></canvas>

<div class="page">

  <header class="header">
    <div class="header-text">
      <div class="header-title">Output</div>
      <div class="header-sub">Bryan Harper &nbsp;&bull;&nbsp; Tomisato, Chiba</div>
    </div>
    <a class="back-btn" href="index.html">Booha World</a>
  </header>

  <div class="posts" id="posts-container">
    <div class="empty">Loading...</div>
  </div>

</div>

<script type="module">

  import post1 from './posts/arriving-at-zero.js';
  import post2 from './posts/dead-words.js';
  import post3 from './posts/so-so-culture.js';
  import post4 from './posts/leech-sites.js';
  import post5 from './posts/karasuki.js';
  import post6 from './posts/baby-soldier-flies.js';
  import post7 from './posts/why-are-you-tired.js';
  import post8 from './posts/the-middle-finger-is-here.js';

  const POSTS = [post1, post2, post3, post4, post5, post6, post7, post8];

  function getPreview(content) {
    const first = content.trim().split('\n')[0];
    return first.length > 100 ? first.slice(0, 100) + '...' : first;
  }

  function renderPosts() {
    const container = document.getElementById('posts-container');
    if (!POSTS.length) {
      container.innerHTML = '<div class="empty">Nothing here yet.</div>';
      return;
    }

    container.innerHTML = '';

    POSTS.forEach((post, i) => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.style.animationDelay = `${0.5 + i * 0.12}s`;

      const paragraphs = post.content
        .trim()
        .split('\n\n')
        .filter(p => p.trim())
        .map(p => `<p>${p.trim()}</p>`)
        .join('');

      card.innerHTML = `
        <div class="post-header">
          <div class="post-title-group">
            <div class="post-title">${post.title}</div>
            <div class="post-preview">${getPreview(post.content)}</div>
          </div>
          <div class="post-toggle">+</div>
        </div>
        <div class="post-body">
          <div class="post-body-inner">${paragraphs}</div>
        </div>
      `;

      card.querySelector('.post-header').addEventListener('click', () => {
        const isOpen = card.classList.contains('open');
        document.querySelectorAll('.post-card.open').forEach(c => c.classList.remove('open'));
        if (!isOpen) card.classList.add('open');
      });

      if (i < POSTS.length - 1) {
        const divider = document.createElement('div');
        divider.className = 'post-divider';
        container.appendChild(card);
        container.appendChild(divider);
      } else {
        container.appendChild(card);
      }
    });
  }

  renderPosts();

  // ── ORBS ──
  const canvas = document.getElementById('orb-canvas');
  const ctx = canvas.getContext('2d');

  const COLORS = [
    'rgba(255, 224, 102, VAL)',
    'rgba(126, 200, 227, VAL)',
    'rgba(184, 240, 160, VAL)',
    'rgba(240, 160, 200, VAL)',
    'rgba(200, 160, 240, VAL)',
    'rgba(240, 200, 160, VAL)',
  ];

  let orbs = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  function createOrb(yOverride) {
    return {
      x: randomBetween(0, W),
      y: yOverride !== undefined ? yOverride : randomBetween(0, H),
      baseR: randomBetween(2, 5),
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      speed: randomBetween(0.15, 0.45),
      drift: randomBetween(-0.15, 0.15),
      pulse: randomBetween(0, Math.PI * 2),
      pulseSpeed: randomBetween(0.008, 0.02),
      opacity: randomBetween(0.25, 0.6),
    };
  }

  function initOrbs() {
    orbs = [];
    const count = Math.floor((W * H) / 16000);
    for (let i = 0; i < count; i++) orbs.push(createOrb());
  }

  function drawOrb(o) {
    const r = o.baseR * (Math.sin(o.pulse) * 0.4 + 1);
    const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r * 2.5);
    grad.addColorStop(0, o.color.replace('VAL', o.opacity));
    grad.addColorStop(0.5, o.color.replace('VAL', o.opacity * 0.3));
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(o.x, o.y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < orbs.length; i++) {
      const o = orbs[i];
      o.y -= o.speed;
      o.x += o.drift;
      o.pulse += o.pulseSpeed;
      if (o.y < -20) orbs[i] = createOrb(H + 20);
      if (o.x < -20) o.x = W + 20;
      if (o.x > W + 20) o.x = -20;
      drawOrb(o);
    }
    requestAnimationFrame(tick);
  }

  resize();
  initOrbs();
  tick();
  window.addEventListener('resize', () => { resize(); initOrbs(); });

</script>
</body>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Booha World — the English learning universe built for Bryan's English School in Tomisato, Chiba. Explore Booha Adventure, Booha Cards, the Karasuki field guide, and Bryan's Workshop.">
  <meta name="author" content="Bryan Harper">
  <title>The Booha World</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Booha World",
    "url": "https://booha-adventure-studios.github.io/booha-world/",
    "author": {
      "@type": "Person",
      "name": "Bryan Harper",
      "url": "https://www.bryanharper.tokyo"
    },
    "description": "Booha World is a hand-built creative and educational universe by Bryan Harper — native English teacher, maker, and developer based in Tomisato, Chiba, Japan.",
    "sameAs": "https://www.bryanharper.tokyo"
  }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Notable&display=swap" rel="stylesheet" />
  <style>
    
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1614;
      --tile-glow: rgba(255, 220, 100, 0.08);
      --orb-1: #ffe066;
      --orb-2: #7ec8e3;
      --orb-3: #b8f0a0;
      --orb-4: #f0a0c8;
      --orb-5: #c8a0f0;
      --orb-6: #f0c8a0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ── ORBS CANVAS ── */
    #orb-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ── TITLE ── */
    .title {
      font-family: 'Notable', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: #f5ecd7;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 64px;
      opacity: 0;
      transform: translateY(-16px);
      animation: fadeDown 1.2s ease forwards 0.3s;
      text-shadow: 0 0 40px rgba(255, 220, 100, 0.25);
    }

    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    /* ── TILE ── */
    .tile {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.9s ease forwards;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      aspect-ratio: 1 / 1;
      background: #221e1b;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 4px 24px rgba(0,0,0,0.5);
      text-decoration: none;
    }

    .tile:nth-child(1) { animation-delay: 0.5s; }
    .tile:nth-child(2) { animation-delay: 0.65s; }
    .tile:nth-child(3) { animation-delay: 0.8s; }
    .tile:nth-child(4) { animation-delay: 0.95s; }
    .tile:nth-child(5) { animation-delay: 1.1s; }
    .tile:nth-child(6) { animation-delay: 1.25s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, filter 0.4s ease;
      filter: brightness(0.88);
    }

    /* Subtle inner glow on each tile */
    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      box-shadow: inset 0 0 30px rgba(255, 210, 80, 0.06);
      pointer-events: none;
      transition: box-shadow 0.4s ease;
    }

    .tile:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow:
        0 0 0 1px rgba(255,220,100,0.15),
        0 8px 40px rgba(0,0,0,0.7),
        0 0 60px rgba(255, 210, 80, 0.1);
    }

    .tile:hover img {
      transform: scale(1.04);
      filter: brightness(1.05);
    }

    .tile:hover::after {
      box-shadow: inset 0 0 40px rgba(255, 210, 80, 0.14);
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        max-width: 480px;
      }

      .title {
        margin-bottom: 40px;
      }
    }

    @media (max-width: 360px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    }
  </style>
</head>
<body>

<canvas id="orb-canvas"></canvas>

<div class="page">
  <h1 class="title">The Booha World</h1>

  <div class="grid">
    <a class="tile" href="adventure.html">
      <img src="assets/img/adventure.png" alt="Booha Adventure" />
    </a>
    <a class="tile" href="cards.html">
      <img src="assets/img/cards.png" alt="Booha Cards" />
    </a>
    <a class="tile" href="zukan.html">
      <img src="assets/img/zukan.png" alt="Zukan" />
    </a>
    <a class="tile" href="workshop.html">
      <img src="assets/img/workshop.png" alt="Bryan's Workshop" />
    </a>
    <a class="tile" href="school.html">
      <img src="assets/img/school.png" alt="Bryan's English School" />
    </a>
    <a class="tile" href="curricula.html">
      <img src="assets/img/curricula.png" alt="Curricula" />
    </a>
    <a class="tile" href="bryan.html">
      <img src="assets/img/bryan.png" alt="Bryan Harper" />
    </a>
  </div>
</div>

<audio id="bg-audio" src="assets/audio/booha-world-index.mp3" preload="auto"></audio>

<script>
  // ── FLOATING ORBS ──
  const canvas = document.getElementById('orb-canvas');
  const ctx = canvas.getContext('2d');

  const COLORS = [
    'rgba(255, 224, 102, VAL)',   // yellow
    'rgba(126, 200, 227, VAL)',   // blue
    'rgba(184, 240, 160, VAL)',   // green
    'rgba(240, 160, 200, VAL)',   // pink
    'rgba(200, 160, 240, VAL)',   // purple
    'rgba(240, 200, 160, VAL)',   // peach
  ];

  let orbs = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomBetween(a, b) {
    return a + Math.random() * (b - a);
  }

  function createOrb(yOverride) {
    const r = randomBetween(2, 5.5);
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    return {
      x: randomBetween(0, W),
      y: yOverride !== undefined ? yOverride : randomBetween(0, H),
      r,
      baseR: r,
      color,
      speed: randomBetween(0.18, 0.55),
      drift: randomBetween(-0.18, 0.18),
      pulse: randomBetween(0, Math.PI * 2),
      pulseSpeed: randomBetween(0.008, 0.022),
      opacity: randomBetween(0.35, 0.75),
    };
  }

  function initOrbs() {
    orbs = [];
    const count = Math.floor((W * H) / 14000);
    for (let i = 0; i < count; i++) {
      orbs.push(createOrb());
    }
  }

  function drawOrb(o) {
    const pulse = Math.sin(o.pulse) * 0.4 + 1;
    const r = o.baseR * pulse;
    const colorStr = o.color.replace('VAL', o.opacity);
    const glowStr = o.color.replace('VAL', o.opacity * 0.35);

    const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r * 2.5);
    grad.addColorStop(0, colorStr);
    grad.addColorStop(0.5, glowStr);
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.beginPath();
    ctx.arc(o.x, o.y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < orbs.length; i++) {
      const o = orbs[i];
      o.y -= o.speed;
      o.x += o.drift;
      o.pulse += o.pulseSpeed;

      // wrap around
      if (o.y < -20) {
        orbs[i] = createOrb(H + 20);
      }
      if (o.x < -20) o.x = W + 20;
      if (o.x > W + 20) o.x = -20;

      drawOrb(o);
    }

    requestAnimationFrame(tick);
  }

  resize();
  initOrbs();
  tick();
  window.addEventListener('resize', () => { resize(); initOrbs(); });

  // ── AUDIO: play once on load ──
  const audio = document.getElementById('bg-audio');
  audio.volume = 0.55;

  // Try autoplay; fall back to first interaction
  const tryPlay = () => {
    audio.play().catch(() => {});
  };

  window.addEventListener('load', () => {
    setTimeout(tryPlay, 800);
  });

  // fallback: first click/touch anywhere
  const fallback = () => {
    tryPlay();
    document.removeEventListener('click', fallback);
    document.removeEventListener('touchstart', fallback);
  };
  document.addEventListener('click', fallback);
  document.addEventListener('touchstart', fallback);
</script>

</body>
</html>
